spring.application.name=transactions-importer
spring.mongodb.uri=mongodb://localhost:27017/transactions-importer
spring.data.mongodb.auto-index-creation=true
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=4
spring.task.execution.pool.queue-capacity=10
spring.task.execution.pool.keep-alive=60s
spring.task.execution.thread-name-prefix=csv-parser-
spring.task.execution.shutdown.await-termination=true
spring.task.execution.shutdown.await-termination-period=60s
management.endpoints.web.exposure.include=health